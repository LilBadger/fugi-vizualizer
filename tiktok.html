<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fugi Visualizer - TikTok 9:16</title>
  <style>
    :root {
      color-scheme: dark;
      --hot: #ff2eea;
      --cyan: #19f7ff;
      --ink: #02020c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #02020c;
    }

    body {
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage-shell {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 34%, rgba(255, 46, 234, .18), transparent 34%),
        radial-gradient(circle at 50% 68%, rgba(25, 247, 255, .14), transparent 38%),
        linear-gradient(180deg, #02020c 0%, #050523 47%, #02020c 100%);
    }

    .stage-shell::before {
      content: "";
      position: absolute;
      inset: -18%;
      background:
        repeating-linear-gradient(0deg, rgba(25, 247, 255, .08) 0 1px, transparent 1px 6px),
        repeating-linear-gradient(90deg, rgba(255, 46, 234, .055) 0 1px, transparent 1px 74px);
      opacity: .7;
      transform: perspective(900px) rotateX(58deg) translateY(8%);
      transform-origin: center bottom;
      filter: blur(.2px);
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      aspect-ratio: 9 / 16;
      overflow: hidden;
      background: #02020c;
      box-shadow:
        0 0 0 1px rgba(25, 247, 255, .28),
        0 0 42px rgba(255, 46, 234, .38),
        0 0 96px rgba(25, 247, 255, .22);
    }

    .stage::after {
      content: "9:16 REC";
      position: absolute;
      top: 12px;
      right: 14px;
      z-index: 2;
      color: rgba(25, 247, 255, .78);
      font-size: 10px;
      letter-spacing: .18em;
      text-shadow: 0 0 12px rgba(25, 247, 255, .65);
      pointer-events: none;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #02020c;
    }

    @media (aspect-ratio: 9 / 16) {
      .stage {
        width: 100vw;
        height: 100vh;
        box-shadow: none;
      }

      .stage::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="stage-shell" aria-label="TikTok 9 by 16 visualizer stage">
    <div class="stage">
      <iframe title="Fugi neon ASCII visualizer" src="./index.html" allow="autoplay"></iframe>
    </div>
  </div>
</body>
</html>
